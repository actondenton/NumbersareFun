<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NumbersareFun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Curtain Animation -->
    <div id="curtain" class="curtain">
        <div class="valance"></div>
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>

    <!-- Left Sidebar Navigation -->
    <div id="sidebar">
        <button class="nav-btn" data-mode="1">1</button>
        <button class="nav-btn" data-mode="2">2</button>
        <button class="nav-btn" data-mode="3">3</button>
        <button class="nav-btn" data-mode="5">5</button>
        <button class="nav-btn" data-mode="7">7</button>
    </div>

    <!-- Top Right Menu + Objectives -->
    <div id="top-right">
        <button id="menu-btn">Menu</button>

        <div id="objectives">
            <h3>Short term objectives</h3>
            <ul id="objective-list"></ul>
        </div>
        <div id="long-objectives">
            <h3>Long Term Objectives</h3>
            <ul id="long-objective-list"></ul>
        </div>
        <div id="earned-bonuses-panel" class="earned-bonuses-panel">
            <h3>Earned Bonuses</h3>
            <ul id="earned-bonuses-list"></ul>
        </div>
    </div>

    <!-- Global Incremental Counter -->
	<div class="incremental-count-countainer">
	    <div id="incremental-count-label">Total Count</div>
        <div id="incremental-count">1</div>
        <div id="hand-counts-container" class="hand-counts-container" style="display: none;"></div>
        <div id="incremental-rate-label">Count per second</div>
        <div id="incremental-rate">0.00</div>
	</div>

    <!-- Speed Upgrade (per hand) -->
    <div id="upgrade-container" class="upgrade-container" style="display: none;">
        <div id="speed-upgrades-container" class="speed-upgrades-container"></div>
        <button id="speed-autobuy-btn" class="upgrade-btn" style="display: none;"></button>
    </div>

    <!-- Cheapen (per hand) -->
    <div id="cheapen-container" class="upgrade-container" style="display: none;">
        <div id="cheapen-upgrades-container" class="cheapen-upgrades-container"></div>
    </div>

    <!-- Hand combos: bubble-up notification (center of screen) -->
    <div id="combo-bubble-container" class="combo-bubble-container" aria-live="polite"></div>

    <!-- Hands Grid -->
    <div id="hands-container" class="hands-grid"></div>

    <!-- Dev tools (toggle on/off) -->
    <button type="button" id="dev-tools-toggle" class="dev-tools-toggle">Dev</button>
    <div id="dev-tools-panel" class="dev-tools-panel" style="display: none;">
        <div class="dev-tools-row">
            <label>Seconds since load:</label>
            <span id="dev-seconds-elapsed">0</span>
        </div>
        <div class="dev-tools-row">
            <label>Add to count:</label>
            <input type="number" id="dev-add-count-input" min="0" value="0" class="dev-input" />
            <button type="button" id="dev-add-count-btn" class="dev-btn">Add</button>
        </div>
    </div>

    <!-- Action log (bottom, expandable) -->
    <div id="action-log" class="action-log">
        <div id="action-log-lines" class="action-log-lines"></div>
        <button type="button" id="action-log-toggle" class="action-log-toggle">Show more</button>
    </div>

    <script src="game.js"></script>

/* ---------------------------------------------------------
       GLOBAL STATE
    --------------------------------------------------------- */
    const maxHands = 10;
    let totalChanges = 1;
    let handEarnings = Array(maxHands).fill(0);
    handEarnings[0] = 1;
    let unlockedHands = 1;

    function refreshTotalFromHandEarnings() {
        totalChanges = handEarnings.reduce((a, b) => a + b, 0);
    }

    const incrementalEl = document.getElementById("incremental-count");
    const handCountsContainerEl = document.getElementById("hand-counts-container");
    const incrementalRateEl = document.getElementById("incremental-rate");
    const handsContainer = document.getElementById("hands-container");
    const objectiveList = document.getElementById("objective-list");
    const longObjectiveList = document.getElementById("long-objective-list");
    const actionLogEl = document.getElementById("action-log-lines");
    const actionLogToggle = document.getElementById("action-log-toggle");
    const actionLogContainer = document.getElementById("action-log");

    const ACTION_LOG_MAX = 50;
    const ACTION_LOG_VISIBLE = 3;
    const ACTION_LOG_EXPANDED = 15;
    const actionLogEntries = [];
    let actionLogExpanded = false;
    const RECENT_RANDOM_LOG_COUNT = 3;
    const recentRandomLogMessages = [];
    const LOG_MESSAGES = [
        "Keep counting!",
        "How fast can you count?",
        "Have you ever counted on your fingers?",
        "What about counting with multiple hands?",
        "Every number counts.",
        "Speed is key.",
        "Counting is fun.",
        "Counting is addictive.",
        "Counting is challenging.",
        "Counting is rewarding.",
        "Counting is satisfying.",
        "Counting is relaxing.",
       "You can always count to one more.",
        "Counting is a skill that can be improved.",
        "I wanted to add subtraction but I came up with nothing.",
        "At one point we counted from zero to one for the very first time",
        "We don't know the biggest number someone or something has counted to",
        "This game will have exponents in the hundreds but the universe only has 10e80 atoms. However, the universe is infinitely more complex than this game. Explain that to me.",
        "If machines do all the counting what will we use our fingers for?",
        "Most people can identify 4-5 objects without counting. Some people are better than others, this is called subitizing.  "
    ];

    function addToLog(msg, type) {
        actionLogEntries.push({ text: msg, type: type || "message" });
        if (actionLogEntries.length > ACTION_LOG_MAX) actionLogEntries.shift();
        renderActionLog();
    }
    function renderActionLog() {
        const n = actionLogExpanded ? ACTION_LOG_EXPANDED : ACTION_LOG_VISIBLE;
        const toShow = actionLogEntries.slice(-n);
        actionLogEl.innerHTML = "";
        toShow.forEach(entry => {
            const line = document.createElement("div");
            line.className = "action-log-line action-log-" + entry.type;
            line.textContent = entry.text;
            actionLogEl.appendChild(line);
        });
    }
    if (actionLogToggle) {
        actionLogToggle.addEventListener("click", () => {
            actionLogExpanded = !actionLogExpanded;
            actionLogToggle.textContent = actionLogExpanded ? "Show less" : "Show more";
            if (actionLogContainer) actionLogContainer.classList.toggle("expanded", actionLogExpanded);
            renderActionLog();
        });
    }

    const NAMES = ["", "thousand", "million", "billion", "trillion", "quadrillion", "quintillion", "sextillion", "septillion", "octillion", "nonillion", "decillion"];
    function formatWithCommas(n) {
        if (n < 1000) return String(n);
        const parts = String(n).split(".");
        const withCommas = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.length > 1 ? withCommas + "." + parts[1] : withCommas;
    }
    function formatCount(n) {
        if (n < 1e6) return formatWithCommas(n);
        const exp = Math.floor(Math.log10(n));
        const tier = Math.floor(exp / 3);
        const mantissa = (n / Math.pow(10, tier * 3)).toFixed(2);
        const name = NAMES[tier] || "e" + (tier * 3);
        return mantissa + " " + name;
    }

    /* ---------------------------------------------------------
       OBJECTIVES (short term: 10, 100, 1000; long term: 1e9, ...)
       Once achieved, stays complete even if count drops later.
    --------------------------------------------------------- */
    const objectives = [
        { goal: 10, text: "Unlock speed increase", achieved: false },
        { goal: 100, text: "Unlocks speed increase auto buyer", achieved: false },
        { goal: 1000, text: "Unlock speed increase Cheapen", achieved: false }
    ];
    const longTermObjectives = [
        { goal: 1e9, text: "Unlock a second hand", achieved: false },
        { goal: 1e12, text: "Unlock a third hand", achieved: false },
        { goal: 1e15, text: "Unlock a fourth hand", achieved: false },
        { goal: 1e18, text: "Unlock a fifth hand", achieved: false },
        { goal: 1e21, text: "Unlock a sixth hand", achieved: false },
        { goal: 1e24, text: "Unlock a seventh hand", achieved: false },
        { goal: 1e27, text: "Unlock a eighth hand", achieved: false },
        { goal: 1e30, text: "Unlock a ninth hand", achieved: false },
        { goal: 1e33, text: "Unlock a tenth hand", achieved: false }
    ];

    function renderObjective(obj, totalChanges) {
        const li = document.createElement("li");
        li.textContent = `Reach ${formatCount(obj.goal)} — ${obj.text}`;
        if (totalChanges >= obj.goal) obj.achieved = true;
        if (obj.achieved) {
            li.style.textDecoration = "line-through";
            li.style.color = "#4CAF50";
        }
        return li;
    }

    function updateObjectives() {
        objectives.forEach(obj => { if (totalChanges >= obj.goal) obj.achieved = true; });
        const lastCompleted = objectives.filter(o => o.achieved).pop();
        const nextUncompleted = objectives.find(o => !o.achieved);
        const shortTermToShow = [lastCompleted, nextUncompleted].filter(Boolean);
        objectiveList.innerHTML = "";
        shortTermToShow.forEach(obj => {
            objectiveList.appendChild(renderObjective(obj, totalChanges));
        });
        longTermObjectives.forEach(obj => { if (totalChanges >= obj.goal) obj.achieved = true; });
        const longLastCompleted = longTermObjectives.filter(o => o.achieved).pop();
        const longNextUncompleted = longTermObjectives.find(o => !o.achieved);
        const longTermToShow = [longLastCompleted, longNextUncompleted].filter(Boolean);
        longObjectiveList.innerHTML = "";
        longTermToShow.forEach(obj => {
            longObjectiveList.appendChild(renderObjective(obj, totalChanges));
        });
    }

    /* ---------------------------------------------------------
       SPEED UPGRADE (per-hand)
    --------------------------------------------------------- */
    let speedLevel = Array(maxHands).fill(0);
    let autoBuyUnlocked = false;
    let autoBuyEnabled = false;
    function getSpeedMultiplierForLevel(level) {
        if (level === 0) return 1;
        return Math.pow(2, level); 
    }
    function getSpeedMultiplier(handIndex) {
        return getSpeedMultiplierForLevel(speedLevel[handIndex] ?? 0);
    }
    function getUpgradeCost(handIndex, nextLevel) {
        const baseCost = 10 + Math.floor(Math.pow(4, nextLevel));
        return Math.max(1, Math.floor(baseCost * getCheapenMultiplier(handIndex)));
    }
    const upgradeContainer = document.getElementById("upgrade-container");
    const speedUpgradesContainerEl = document.getElementById("speed-upgrades-container");
    const speedAutoBuyBtn = document.getElementById("speed-autobuy-btn");
    const speedRowRefs = [];

    function ensureSpeedRows() {
        if (!speedUpgradesContainerEl) return;
        while (speedRowRefs.length < unlockedHands) {
            const i = speedRowRefs.length;
            const handNum = i + 1;
            const row = document.createElement("div");
            row.className = "speed-upgrade-row";
            row.setAttribute("data-hand-index", String(i));
            row.innerHTML = "<span class=\"speed-upgrade-label\">Hand " + handNum + "</span> " +
                "<span class=\"speed-upgrade-balance\"></span> " +
                "<span class=\"speed-upgrade-level\"></span> " +
                "<span class=\"speed-upgrade-cost\"></span> " +
                "<span class=\"speed-upgrade-effect\"></span> " +
                "<button type=\"button\" class=\"upgrade-btn speed-upgrade-btn\" data-hand-index=\"" + i + "\">Upgrade</button>";
            speedUpgradesContainerEl.appendChild(row);
            speedRowRefs.push({
                balanceEl: row.querySelector(".speed-upgrade-balance"),
                levelEl: row.querySelector(".speed-upgrade-level"),
                costEl: row.querySelector(".speed-upgrade-cost"),
                effectEl: row.querySelector(".speed-upgrade-effect"),
                btn: row.querySelector(".speed-upgrade-btn")
            });
        }
    }

    function getCheapestSpeedUpgrade() {
        let best = null;
        for (let i = 0; i < unlockedHands; i++) {
            const nextLevel = speedLevel[i] + 1;
            const cost = getUpgradeCost(i, nextLevel);
            if ((handEarnings[i] || 0) < cost) continue;
            if (best === null || cost < best.cost) best = { handIndex: i, cost, nextLevel };
        }
        return best;
    }
    function updateSpeedUpgradeUI() {
        if (totalChanges >= 10 && upgradeContainer.style.display === "none") {
            upgradeContainer.style.display = "block";
            ensureSpeedRows();
        }
        if (speedUpgradesContainerEl) {
            ensureSpeedRows();
            for (let i = 0; i < unlockedHands; i++) {
                const ref = speedRowRefs[i];
                if (!ref) continue;
                const nextLevel = speedLevel[i] + 1;
                const cost = getUpgradeCost(i, nextLevel);
                const balance = handEarnings[i] || 0;
                const canAfford = balance >= cost;
                const currentMult = getSpeedMultiplier(i);
                const nextMult = getSpeedMultiplierForLevel(nextLevel);
                const percent = (nextMult / currentMult - 1) * 100;
                ref.balanceEl.textContent = "Balance: " + formatCount(balance);
                ref.levelEl.textContent = "Level " + speedLevel[i];
                ref.costEl.textContent = "Cost: " + formatCount(cost);
                ref.effectEl.textContent = "+" + percent.toFixed(1) + "%";
                ref.btn.disabled = !canAfford;
            }
        }

        if (totalChanges >= 100 || autoBuyUnlocked) {
            speedAutoBuyBtn.style.display = "block";
            const unlockCost = 100;
            if (!autoBuyUnlocked) {
                speedAutoBuyBtn.textContent = "Unlock speed autobuy (Cost: " + formatCount(unlockCost) + ")";
                speedAutoBuyBtn.disabled = totalChanges < unlockCost;
            } else {
                speedAutoBuyBtn.textContent = "Autobuy speed upgrades: " + (autoBuyEnabled ? "ON" : "OFF");
                speedAutoBuyBtn.disabled = false;
            }
        } else {
            speedAutoBuyBtn.style.display = "none";
        }
    }

    function buySpeedUpgradeForHand(handIndex) {
        if (handIndex < 0 || handIndex >= unlockedHands) return;
        const nextLevel = speedLevel[handIndex] + 1;
        const cost = getUpgradeCost(handIndex, nextLevel);
        const balance = handEarnings[handIndex] || 0;
        if (balance < cost) return;
        handEarnings[handIndex] = balance - cost;
        refreshTotalFromHandEarnings();
        speedLevel[handIndex]++;
        const handNum = handIndex + 1;
        addToLog("Speed upgrade purchased for Hand " + handNum + " (level " + speedLevel[handIndex] + ")", "action");
        incrementalEl.textContent = formatCount(totalChanges);
        hands.forEach(h => h.restartTimer());
        updateSpeedUpgradeUI();
        updateCheapenUpgradeUI();
        updateRateDisplay();
    }

    function handleSpeedAutoBuyClick() {
        const unlockCost = 100;
        if (!autoBuyUnlocked) {
            if (totalChanges < unlockCost) return;
            const ratio = (totalChanges - unlockCost) / totalChanges;
            for (let i = 0; i < unlockedHands; i++) handEarnings[i] = Math.round((handEarnings[i] || 0) * ratio);
            refreshTotalFromHandEarnings();
            autoBuyUnlocked = true;
            autoBuyEnabled = true;
            addToLog("Speed autobuy unlocked", "action");
            incrementalEl.textContent = formatCount(totalChanges);
            updateSpeedUpgradeUI();
            updateCheapenUpgradeUI();
        } else {
            autoBuyEnabled = !autoBuyEnabled;
            updateSpeedUpgradeUI();
        }
    }

    /* ---------------------------------------------------------
       CHEAPEN SPEED UPGRADE (per-hand), max 6 per hand. 99%, 99.9%, ...
    --------------------------------------------------------- */
    const MAX_CHEAPEN_LEVEL = 6;
    let cheapenLevel = Array(maxHands).fill(0);
    function getCheapenMultiplier(handIndex) {
        const level = cheapenLevel[handIndex] ?? 0;
        return level === 0 ? 1 : Math.pow(10, -(level + 1));
    }
    function getCheapenUpgradeCost(handIndex, nextLevel) {
        return 1000 * Math.pow(10, nextLevel - 1);
    }
    const cheapenContainer = document.getElementById("cheapen-container");
    const cheapenUpgradesContainerEl = document.getElementById("cheapen-upgrades-container");
    let cheapenSectionUnlocked = false;
    const cheapenRowRefs = [];

    function getCheapenEffectText(nextLevel) {
        if (nextLevel <= 0 || nextLevel > MAX_CHEAPEN_LEVEL) return "";
        if (nextLevel === 1) return "99% off speed upgrade cost";
        const decimals = nextLevel - 1;
        return "99." + "9".repeat(decimals) + "% off speed upgrade cost";
    }

    function ensureCheapenRows() {
        if (!cheapenUpgradesContainerEl) return;
        while (cheapenRowRefs.length < unlockedHands) {
            const i = cheapenRowRefs.length;
            const handNum = i + 1;
            const row = document.createElement("div");
            row.className = "cheapen-upgrade-row";
            row.setAttribute("data-hand-index", String(i));
            row.innerHTML = "<span class=\"cheapen-upgrade-label\">Hand " + handNum + "</span> " +
                "<span class=\"cheapen-upgrade-level\"></span> " +
                "<span class=\"cheapen-upgrade-cost\"></span> " +
                "<span class=\"cheapen-upgrade-effect\"></span> " +
                "<button type=\"button\" class=\"upgrade-btn cheapen-upgrade-btn\" data-hand-index=\"" + i + "\">Cheapen</button>";
            cheapenUpgradesContainerEl.appendChild(row);
            cheapenRowRefs.push({
                levelEl: row.querySelector(".cheapen-upgrade-level"),
                costEl: row.querySelector(".cheapen-upgrade-cost"),
                effectEl: row.querySelector(".cheapen-upgrade-effect"),
                btn: row.querySelector(".cheapen-upgrade-btn")
            });
        }
    }

    function updateCheapenUpgradeUI() {
        const hand1Balance = handEarnings[0] || 0;
        if (!cheapenSectionUnlocked && hand1Balance >= 1000) {
            cheapenSectionUnlocked = true;
            if (cheapenContainer) cheapenContainer.style.display = "block";
            ensureCheapenRows();
        }
        if (!cheapenSectionUnlocked) return;
        ensureCheapenRows();
        for (let i = 0; i < unlockedHands; i++) {
            const ref = cheapenRowRefs[i];
            if (!ref) continue;
            const level = cheapenLevel[i] ?? 0;
            const nextLevel = level + 1;
            const cost = level >= MAX_CHEAPEN_LEVEL ? null : getCheapenUpgradeCost(i, nextLevel);
            const balance = handEarnings[i] || 0;
            const canAfford = cost !== null && balance >= cost;
            if (level >= MAX_CHEAPEN_LEVEL) {
                ref.levelEl.textContent = "Max (" + level + "/" + MAX_CHEAPEN_LEVEL + ")";
                ref.costEl.textContent = "";
                ref.effectEl.textContent = "";
                ref.btn.style.display = "none";
            } else {
                ref.levelEl.textContent = "Level " + level;
                ref.costEl.textContent = "Cost: " + formatCount(cost);
                ref.effectEl.textContent = getCheapenEffectText(nextLevel);
                ref.btn.style.display = "";
                ref.btn.disabled = !canAfford;
            }
        }
    }

    function buyCheapenUpgradeForHand(handIndex) {
        if (handIndex < 0 || handIndex >= unlockedHands) return;
        const level = cheapenLevel[handIndex] ?? 0;
        if (level >= MAX_CHEAPEN_LEVEL) return;
        const nextLevel = level + 1;
        const cost = getCheapenUpgradeCost(handIndex, nextLevel);
        const balance = handEarnings[handIndex] || 0;
        if (balance < cost) return;
        handEarnings[handIndex] = balance - cost;
        refreshTotalFromHandEarnings();
        cheapenLevel[handIndex] = level + 1;
        const handNum = handIndex + 1;
        addToLog("Speed cheapen purchased for Hand " + handNum + " (level " + cheapenLevel[handIndex] + ")", "action");
        incrementalEl.textContent = formatCount(totalChanges);
        updateSpeedUpgradeUI();
        updateCheapenUpgradeUI();
    }

    /* ---------------------------------------------------------
       RATE DISPLAY and TICK INTERVAL (per-hand; total CPS = sum of hand CPS)
    --------------------------------------------------------- */
    function getTickIntervalMs(baseSpeed, handIndex) {
        return baseSpeed / getSpeedMultiplier(handIndex);
    }
    function updateHandCountsDisplay() {
        if (!handCountsContainerEl) return;
        if (unlockedHands < 2) {
            handCountsContainerEl.style.display = "none";
            return;
        }
        handCountsContainerEl.style.display = "block";
        handCountsContainerEl.textContent = Array.from({ length: unlockedHands }, (_, i) => "Hand " + (i + 1) + ": " + formatCount(Math.round(handEarnings[i] || 0))).join(" · ");
    }
    function updateRateDisplay() {
        const cpsPerHand = [];
        let cpsTotalRaw = 0;
        hands.forEach(h => {
            const handIndex = h.id - 1;
            const intervalMs = getTickIntervalMs(h.baseSpeed, handIndex);
            const cps = intervalMs > 0 ? 1000 / intervalMs : 0;
            cpsPerHand.push(cps);
            cpsTotalRaw += cps;
        });
        const comboMult = getComboMultiplier();
        const cpsTotal = cpsTotalRaw * comboMult;
        if (unlockedHands >= 2) {
            const parts = cpsPerHand.slice(0, unlockedHands).map((cps, i) => {
                const effectiveCps = cps * comboMult;
                return "H" + (i + 1) + ": " + formatCount(effectiveCps < 1e6 ? Math.round(effectiveCps * 100) / 100 : effectiveCps) + "/s";
            });
            incrementalRateEl.textContent = parts.join(" · ") + " (Total: " + formatCount(cpsTotal < 1e6 ? Math.round(cpsTotal * 100) / 100 : cpsTotal) + "/s)";
        } else {
            incrementalRateEl.textContent = formatCount(cpsTotal < 1e6 ? Math.round(cpsTotal * 100) / 100 : cpsTotal);
        }
        updateHandCountsDisplay();
    }

    function maybeAutoBuySpeedUpgrade() {
        if (!autoBuyEnabled || !autoBuyUnlocked) return;
        const next = getCheapestSpeedUpgrade();
        if (next && (handEarnings[next.handIndex] || 0) >= next.cost) {
            buySpeedUpgradeForHand(next.handIndex);
        }
    }

    /* ---------------------------------------------------------
       HAND CLASS
    --------------------------------------------------------- */
    const GAME_LOOP_MS = 50;
    let gameLoopTimer = null;

    class HandCounter {
        constructor(id, speed) {
            this.id = id;
            this.count = 1;
            this.baseSpeed = speed;
            this.accumulatorMs = 0;

            this.el = document.createElement("div");
            this.el.className = "hand curtain-reveal";
            this.el.style.whiteSpace = "pre";
            this.el.style.fontFamily = "monospace";

            handsContainer.appendChild(this.el);

            this.render();

            setTimeout(() => {
                this.el.classList.add("visible");
            }, 300);
        }

        restartTimer() { /* speed applied in game loop */ }

        applyTicks(n) {
            if (n <= 0) return;
            this.count = ((this.count - 1 + n) % 10) + 1;
            this.render();
        }

        render() {
            this.el.textContent = hands1[this.count - 1];
        }
    }

    /* ---------------------------------------------------------
       HAND MANAGEMENT
       Hand 1: immediate. Hand 2: 1e9, 3: 1e12, 4: 1e15, 5: 1e18,
       6: 1e21, 7: 1e24, 8: 1e27, 9: 1e30, 10: 1e33
    --------------------------------------------------------- */
    const hands = [];
    const UNLOCK_THRESHOLDS = [
        1e9,   // hand 2: 1 billion
        1e12,  // hand 3: 1 trillion
        1e15,  // hand 4: 1 quadrillion
        1e18,  // hand 5: 1 quintillion
        1e21,  // hand 6: 1 sextillion
        1e24,  // hand 7: 1 septillion
        1e27,  // hand 8: 1 octillion
        1e30,  // hand 9: 1 nonillion
        1e33   // hand 10: 1 decillion
    ];

    const HAND_BASE_SPEED = 1000; // ms per tick; same for all hands

    function unlockHand() {
        if (unlockedHands >= maxHands) return;
        unlockedHands++;
        addToLog("Hand " + unlockedHands + " unlocked", "action");
        hands.push(new HandCounter(unlockedHands, HAND_BASE_SPEED));
    }

    function checkUnlockHands() {
        while (unlockedHands <= maxHands && unlockedHands - 1 < UNLOCK_THRESHOLDS.length && totalChanges >= UNLOCK_THRESHOLDS[unlockedHands - 1]) {
            unlockHand();
        }
    }

    /* ---------------------------------------------------------
       INITIALIZE FIRST HAND (appears immediately)
    --------------------------------------------------------- */
    hands.push(new HandCounter(1, HAND_BASE_SPEED));

    /* ---------------------------------------------------------
       HAND COMBOS (poker-style: hand values 1–10, bonuses stack)
    --------------------------------------------------------- */
    function getHandValues() {
        return hands.map(h => h.count);
    }
    function countValues(v) {
        const c = {};
        for (let i = 1; i <= 10; i++) c[i] = 0;
        v.forEach(x => {
            const key = Number(x);
            if (key >= 1 && key <= 10) c[key] = (c[key] || 0) + 1;
        });
        return c;
    }
    const BONUS_BY_COUNT = { 2: 1.10, 3: 1.20, 4: 1.35, 5: 1.40, 6: 1.45, 7: 1.50, 8: 1.55, 9: 1.60, 10: 1.65 };
    const COUNT_NAMES = ["", "", "Pair of", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten"];
    const COMBOS = [];
    for (let n = 1; n <= 10; n++) {
        for (let k = 2; k <= 10; k++) {
            const name = (k === 2 ? "Pair of " + n + "s" : COUNT_NAMES[k] + " " + n + "s");
            let check;
            if (k === 2) (function(nn) { check = v => v[0] === nn && v[1] === nn; })(n);
            else if (k === 3) (function(nn) { check = v => v[0] === nn && v[1] === nn && v[2] === nn; })(n);
            else (function(nn, kk) { check = v => countValues(v)[nn] >= kk; })(n, k);
            COMBOS.push({ name, minHands: k, check, bonus: BONUS_BY_COUNT[k] });
        }
    }
    COMBOS.push(
        { name: "Two Pair (1s & 2s)", minHands: 4, check: v => { const c = countValues(v); return c[1] >= 2 && c[2] >= 2; }, bonus: 1.15 },
        { name: "Straight (1–5)", minHands: 5, check: v => [...v.slice(0, 5)].sort((a, b) => a - b).join() === "1,2,3,4,5", bonus: 1.25 },
        { name: "Full House", minHands: 5, check: v => { const c = countValues(v); const counts = Object.values(c).filter(n => n > 0).sort((a, b) => b - a); return counts[0] >= 3 && counts[1] >= 2; }, bonus: 1.30 },
        { name: "High straight (6–10)", minHands: 5, check: v => [...v.slice(0, 5)].sort((a, b) => a - b).join() === "6,7,8,9,10", bonus: 1.35 }
    );
    function getActiveCombos() {
        const v = getHandValues();
        return COMBOS.filter(c => v.length >= c.minHands && c.check(v));
    }
    const earnedComboNames = [];
    function getComboMultiplier() {
        const earnedSet = new Set(earnedComboNames);
        let mult = 1;
        COMBOS.forEach(c => {
            if (earnedSet.has(c.name)) mult *= c.bonus;
        });
        return mult;
    }
    const comboBubbleContainerEl = document.getElementById("combo-bubble-container");
    const earnedBonusesListEl = document.getElementById("earned-bonuses-list");
    const COMBO_BUBBLE_DURATION_MS = 3500;
    function showComboBubble(newlyEarned) {
        if (!comboBubbleContainerEl || newlyEarned.length === 0) return;
        const totalMult = newlyEarned.reduce((m, c) => m * c.bonus, 1);
        const text = newlyEarned.map(c => c.name + " +" + Math.round((c.bonus - 1) * 100) + "%").join(" · ");
        const totalText = "Total bonus: +" + Math.round((totalMult - 1) * 100) + "%";
        const bubble = document.createElement("div");
        bubble.className = "combo-bubble";
        bubble.innerHTML = "<span class=\"combo-bubble-names\">" + text + "</span><span class=\"combo-bubble-total\">" + totalText + "</span>";
        comboBubbleContainerEl.appendChild(bubble);
        requestAnimationFrame(() => bubble.classList.add("combo-bubble-visible"));
        setTimeout(() => { if (bubble.parentNode) bubble.parentNode.removeChild(bubble); }, COMBO_BUBBLE_DURATION_MS);
    }
    function updateEarnedBonusesUI() {
        if (!earnedBonusesListEl) return;
        earnedBonusesListEl.innerHTML = "";
        const earnedSet = new Set(earnedComboNames);
        const byMinHands = {};
        COMBOS.forEach(c => {
            if (!byMinHands[c.minHands]) byMinHands[c.minHands] = [];
            byMinHands[c.minHands].push(c);
        });
        for (let n = 2; n <= 10; n++) {
            const group = byMinHands[n] || [];
            if (group.length === 0) continue;
            const earnedInGroup = group.filter(c => earnedSet.has(c.name));
            if (earnedInGroup.length === 0) continue;
            if (earnedInGroup.length === group.length) {
                const totalMult = earnedInGroup.reduce((m, c) => m * c.bonus, 1);
                const totalPct = Math.round((totalMult - 1) * 100);
                const li = document.createElement("li");
                li.className = "earned-bonuses-summary";
                li.textContent = "All bonuses earned for " + n + " hands (+" + totalPct + "% total)";
                earnedBonusesListEl.appendChild(li);
            } else {
                earnedInGroup.forEach(c => {
                    const pct = Math.round((c.bonus - 1) * 100);
                    const li = document.createElement("li");
                    li.textContent = c.name + " (+" + pct + "%)";
                    earnedBonusesListEl.appendChild(li);
                });
            }
        }
    }
    function updateComboUI() {
        if (unlockedHands < 2) return;
        const active = getActiveCombos();
        const newlyEarned = active.filter(c => earnedComboNames.indexOf(c.name) === -1);
        if (newlyEarned.length > 0) {
            newlyEarned.forEach(c => earnedComboNames.push(c.name));
            showComboBubble(newlyEarned);
            updateEarnedBonusesUI();
        }
    }

    function gameLoopTick() {
        const dt = GAME_LOOP_MS;
        const ticksPerHand = Array(unlockedHands).fill(0);
        hands.forEach(h => {
            const handIndex = h.id - 1;
            const mult = getSpeedMultiplier(handIndex);
            const intervalMs = h.baseSpeed / mult;
            if (intervalMs <= 0) return;
            h.accumulatorMs = (h.accumulatorMs || 0) + dt;
            const n = Math.floor(h.accumulatorMs / intervalMs);
            h.accumulatorMs -= n * intervalMs;
            ticksPerHand[handIndex] = n;
            h.applyTicks(n);
        });
        const totalTicks = ticksPerHand.reduce((a, b) => a + b, 0);
        if (totalTicks > 0) {
            const comboMult = getComboMultiplier();
            const bonusTicks = Math.round(totalTicks * comboMult);
            for (let i = 0; i < unlockedHands; i++) {
                handEarnings[i] += Math.round((ticksPerHand[i] / totalTicks) * bonusTicks);
            }
            refreshTotalFromHandEarnings();
            incrementalEl.textContent = formatCount(totalChanges);
            updateObjectives();
            checkUnlockHands();
            maybeAutoBuySpeedUpgrade();
            const now = Date.now();
            if (now - lastUIUpdateMs >= UI_UPDATE_THROTTLE_MS) {
                lastUIUpdateMs = now;
                updateSpeedUpgradeUI();
                updateCheapenUpgradeUI();
                updateRateDisplay();
            }
        }
        updateComboUI();
    }
    let lastUIUpdateMs = 0;
    const UI_UPDATE_THROTTLE_MS = 150;
    if (!gameLoopTimer) gameLoopTimer = setInterval(gameLoopTick, GAME_LOOP_MS);

    setInterval(() => {
        const allowed = LOG_MESSAGES.filter(m => !recentRandomLogMessages.includes(m));
        const pool = allowed.length > 0 ? allowed : LOG_MESSAGES;
        const msg = pool[Math.floor(Math.random() * pool.length)];
        addToLog(msg);
        recentRandomLogMessages.push(msg);
        if (recentRandomLogMessages.length > RECENT_RANDOM_LOG_COUNT) recentRandomLogMessages.shift();
    }, 5000);

    setTimeout(() => addToLog(LOG_MESSAGES[0]), 2000);

    speedAutoBuyBtn.addEventListener("click", handleSpeedAutoBuyClick);
    if (speedUpgradesContainerEl) {
        speedUpgradesContainerEl.addEventListener("click", function(e) {
            const btn = e.target.closest(".speed-upgrade-btn");
            if (!btn || btn.disabled) return;
            const handIndex = parseInt(btn.getAttribute("data-hand-index"), 10);
            if (!isNaN(handIndex)) buySpeedUpgradeForHand(handIndex);
        });
    }
    if (cheapenUpgradesContainerEl) {
        cheapenUpgradesContainerEl.addEventListener("click", function(e) {
            const btn = e.target.closest(".cheapen-upgrade-btn");
            if (!btn || btn.disabled) return;
            const handIndex = parseInt(btn.getAttribute("data-hand-index"), 10);
            if (!isNaN(handIndex)) buyCheapenUpgradeForHand(handIndex);
        });
    }
    updateSpeedUpgradeUI();
    updateCheapenUpgradeUI();
    updateRateDisplay();
    updateComboUI();
    updateEarnedBonusesUI();

    /* ---------------------------------------------------------
       DEV TOOLS (toggle on/off)
    --------------------------------------------------------- */
    const devToolsToggle = document.getElementById("dev-tools-toggle");
    const devToolsPanel = document.getElementById("dev-tools-panel");
    const devSecondsElapsed = document.getElementById("dev-seconds-elapsed");
    const devAddCountInput = document.getElementById("dev-add-count-input");
    const devAddCountBtn = document.getElementById("dev-add-count-btn");

    const devToolsLoadTime = Date.now();
    let devSecondsInterval = null;

    function updateDevSeconds() {
        devSecondsElapsed.textContent = ((Date.now() - devToolsLoadTime) / 1000).toFixed(1);
    }

    devToolsToggle.addEventListener("click", () => {
        const show = devToolsPanel.style.display === "none";
        devToolsPanel.style.display = show ? "block" : "none";
        if (show) {
            updateDevSeconds();
            if (!devSecondsInterval) devSecondsInterval = setInterval(updateDevSeconds, 100);
        } else {
            if (devSecondsInterval) clearInterval(devSecondsInterval);
            devSecondsInterval = null;
        }
    });

    devAddCountBtn.addEventListener("click", () => {
        const val = parseInt(devAddCountInput.value, 10) || 0;
        if (val <= 0) return;
        handEarnings[0] = (handEarnings[0] || 0) + val;
        refreshTotalFromHandEarnings();
        incrementalEl.textContent = formatCount(totalChanges);
        updateObjectives();
        checkUnlockHands();
        updateSpeedUpgradeUI();
        updateCheapenUpgradeUI();
        updateRateDisplay();
    });

    /* ---------------------------------------------------------
       AUTO-UNLOCK HANDS (driven by checkUnlockHands in update())
    --------------------------------------------------------- */

    </script>

</body>
</html>
